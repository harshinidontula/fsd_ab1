
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - NAAC Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="min-h-screen bg-[#f8fafc] flex items-center justify-center p-6 relative overflow-hidden">
  <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-50 rounded-full blur-3xl opacity-60"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-indigo-50 rounded-full blur-3xl opacity-60"></div>

  <div class="w-full max-w-md relative z-10">
    <form method="POST" action="/" class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 p-10 border border-slate-100">

      <!-- Logo -->
      <div class="text-center mb-10">
        <div class="flex justify-center mb-5">
          <img
            src="{{ url_for('static', filename='pragati-logo-JK-2-1536x572.png') }}"
            alt="Pragati Engineering College"
            style="height:72px;width:auto;object-fit:contain;"
          />
        </div>
        <h2 class="text-3xl font-black text-slate-900 tracking-tight">PEC — NAAC Portal</h2>
        <p class="text-slate-500 mt-2 font-medium">Enter credentials to access Criterion-3</p>
      </div>

      <!-- Error -->
      {% if error %}
      <div class="mb-6 p-4 bg-red-50 border border-red-100 text-red-600 text-xs font-bold rounded-xl flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <!-- Role Selector -->
      <div class="grid grid-cols-3 gap-2 mb-6">
        {% for r in ['admin', 'faculty', 'operator'] %}
        <label class="cursor-pointer">
          <input type="radio" name="role" value="{{ r }}" class="sr-only peer" {% if r == 'faculty' %}checked{% endif %}>
          <div class="py-2 text-center text-[10px] font-black uppercase tracking-widest rounded-xl border-2 transition-all border-slate-100 text-slate-400 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 peer-checked:shadow-lg peer-checked:shadow-blue-100 hover:border-slate-200">
            {{ r }}
          </div>
        </label>
        {% endfor %}
      </div>

      <!-- Fields -->
      <div class="space-y-4 mb-6">
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <input type="text" name="login_id" required placeholder="Institutional ID"
            class="w-full pl-11 pr-4 py-4 bg-slate-50 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl outline-none font-bold transition-all text-sm"/>
        </div>
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" name="password" required placeholder="Password"
            class="w-full pl-11 pr-4 py-4 bg-slate-50 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl outline-none font-bold transition-all text-sm"/>
        </div>
      </div>

      <button type="submit" class="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-black rounded-2xl shadow-xl transition-all active:scale-[0.98] flex items-center justify-center gap-3 uppercase tracking-widest text-xs">
        Secure Login
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
      </button>

      <div class="mt-8 text-center pt-6 border-t border-slate-50">
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-loose">
          NAAC Internal Quality Assurance Cell<br/>Institution Information Management System
        </p>
      </div>
    </form>
  </div>
</body>
</html>
