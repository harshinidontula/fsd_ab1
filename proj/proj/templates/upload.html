
{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto space-y-6 animate-in">
  <a href="/criterion/{{ crit_key }}" class="inline-flex items-center gap-2 text-slate-400 hover:text-blue-600 font-bold text-sm transition-all uppercase tracking-widest">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back to Metrics
  </a>

  <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-2xl overflow-hidden">

    <div class="bg-slate-900 px-10 py-10 text-white relative overflow-hidden">
      <div class="absolute top-0 right-0 p-10 opacity-10">
        <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
      </div>
      <div class="text-blue-400 text-[10px] font-black uppercase tracking-[0.3em] mb-3">Upload Evidence</div>
      <h2 class="text-2xl font-black leading-tight max-w-[80%]">{{ sub.id }}: {{ sub.label }}</h2>
      <div class="mt-4">
        {% if session.get('role') == 'admin' %}
        <span class="inline-flex items-center gap-2 px-4 py-2 bg-emerald-500/20 border border-emerald-400/30 text-emerald-300 text-[10px] font-black uppercase tracking-widest rounded-full">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Admin Upload — Will be Auto Approved
        </span>
        {% else %}
        <span class="inline-flex items-center gap-2 px-4 py-2 bg-amber-500/20 border border-amber-400/30 text-amber-300 text-[10px] font-black uppercase tracking-widest rounded-full">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3"/></svg>
          Submitted for Admin Approval
        </span>
        {% endif %}
      </div>
    </div>

    <form method="POST" enctype="multipart/form-data" class="p-10 space-y-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

        <div class="md:col-span-2">
          <label class="block text-xs font-black uppercase text-slate-400 mb-3 tracking-widest">Project / Document Title *</label>
          <input type="text" name="title" required placeholder="Full Title of the Document"
            class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl outline-none font-bold transition-all text-sm"/>
        </div>

        <div>
          <label class="block text-xs font-black uppercase text-slate-400 mb-3 tracking-widest">Agency / Publisher</label>
          <input type="text" name="agency" placeholder="UGC, DST, CSIR, etc."
            class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl outline-none font-bold transition-all text-sm"/>
        </div>

        <div>
          <label class="block text-xs font-black uppercase text-slate-400 mb-3 tracking-widest">Academic Year</label>
          <select name="year" class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl outline-none font-bold transition-all text-sm appearance-none">
            {% for y in ['2024-25','2023-24','2022-23','2021-22','2020-21'] %}
            <option value="{{ y }}">{{ y }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- ✅ type="text" గా మార్చాం — optional గా పని చేస్తుంది -->
        <div class="md:col-span-2">
          <label class="block text-xs font-black uppercase text-slate-400 mb-3 tracking-widest">
            Additional Link
            <span class="normal-case font-semibold text-slate-300 ml-1">(optional)</span>
          </label>
          <input type="text" name="link" placeholder="https://example.com/document"
            class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl outline-none font-bold transition-all text-sm"/>
        </div>
      </div>

      <div>
        <label class="block text-xs font-black uppercase text-slate-400 mb-3 tracking-widest">
          Evidence Attachment
          <span class="normal-case font-semibold text-slate-300 ml-1">(optional)</span>
        </label>
        <label for="file-input" class="border-4 border-dashed border-slate-100 rounded-3xl p-12 text-center hover:border-blue-200 hover:bg-blue-50/20 transition-all cursor-pointer group flex flex-col items-center">
          <input type="file" id="file-input" name="file" accept=".pdf,.xls,.xlsx,.jpg,.jpeg,.png" class="hidden" onchange="updateFileName(this)"/>
          <div class="p-5 bg-slate-50 text-slate-300 group-hover:bg-blue-600 group-hover:text-white rounded-2xl mb-4 transition-all">
            <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
          </div>
          <p id="file-label" class="font-black text-slate-900 text-lg">Click to Browse File</p>
          <p class="text-slate-400 text-sm mt-1 font-medium">Supports PDF, XLS, JPG (Max 5MB)</p>
        </label>
      </div>

      <div class="flex items-center gap-6 pt-2">
        <button type="submit"
          class="flex-1 py-5 text-white rounded-2xl font-black shadow-2xl hover:-translate-y-1 transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-xs
          {% if session.get('role') == 'admin' %}bg-emerald-600 hover:bg-emerald-700 shadow-emerald-200
          {% else %}bg-blue-600 hover:bg-blue-700 shadow-blue-200{% endif %}">
          {% if session.get('role') == 'admin' %}
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Upload & Approve
          {% else %}
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Submit for Approval
          {% endif %}
        </button>
        <a href="/criterion/{{ crit_key }}" class="px-10 py-5 bg-slate-100 text-slate-600 rounded-2xl font-black hover:bg-slate-200 transition-all text-xs uppercase tracking-widest">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function updateFileName(input) {
  const label = document.getElementById('file-label');
  label.textContent = input.files[0] ? input.files[0].name : 'Click to Browse File';
}
</script>
{% endblock %}
